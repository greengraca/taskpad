<!DOCTYPE html>
<html lang="en">
  <head>

    <meta name="theme-color" content="#0c0c0c" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <title>TaskPad</title>

    <!-- SEO -->
    <meta name="description" content="Lightning-fast task manager with real-time team collaboration, encrypted vault, and Markdown notes. Local-first, works offline. PWA & desktop." />
    <meta name="keywords" content="task manager, to-do app, productivity, collaboration, real-time sync, encrypted vault, markdown notes, PWA, desktop app, Tauri" />
    <meta name="author" content="TaskPad" />

    <!-- Open Graph (Facebook, LinkedIn, Discord, Slack, etc.) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://taskpad-phi.vercel.app/" />
    <meta property="og:title" content="TaskPad — Your tasks, everywhere" />
    <meta property="og:description" content="Lightning-fast task manager with real-time team collaboration, encrypted vault, and Markdown notes. Local-first, works offline." />
    <meta property="og:image" content="https://taskpad-phi.vercel.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="TaskPad logo with tagline: Your tasks, everywhere" />
    <meta property="og:site_name" content="TaskPad" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TaskPad — Your tasks, everywhere" />
    <meta name="twitter:description" content="Lightning-fast task manager with real-time team collaboration, encrypted vault, and Markdown notes." />
    <meta name="twitter:image" content="https://taskpad-phi.vercel.app/og-twitter.png" />
    <meta name="twitter:image:alt" content="TaskPad logo with tagline: Your tasks, everywhere" />

    <meta property="og:image" content="https://taskpad-phi.vercel.app/og-square.png" />
    <meta property="og:image:width" content="800" />
    <meta property="og:image:height" content="800" />

    <!-- Microsoft / Windows -->
    <meta name="msapplication-TileColor" content="#0c0c0c" />
    <meta name="msapplication-TileImage" content="/icon-192.png" />

    <!-- Apple -->
    <meta name="apple-mobile-web-app-title" content="TaskPad" />
    <meta name="apple-mobile-web-app-capable" content="yes" />

  <body style="margin:0;background:#0c0c0c;">
