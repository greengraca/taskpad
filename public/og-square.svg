<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <!-- Background -->
  <rect width="800" height="800" fill="#0c0c0c"/>

  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
    </pattern>
  </defs>
  <rect width="800" height="800" fill="url(#grid)" opacity="0.4"/>

  <!-- Content centered in 790px (above orange line), ~144px padding top/bottom -->

  <!-- Logo icon: 340x340 (scale 0.85), centered at x=230, y=144 -->
  <g transform="translate(230, 144) scale(0.85)">
    <rect width="400" height="400" rx="80" ry="80" fill="#F5F2ED"/>
    <circle cx="80" cy="134" r="20" fill="#3DBA8C"/>
    <line x1="80" y1="190" x2="320" y2="190" stroke="#1A1A1A" stroke-width="24" stroke-linecap="round"/>
    <line x1="80" y1="244" x2="248" y2="244" stroke="#1A1A1A" stroke-width="24" stroke-linecap="round"/>
    <line x1="80" y1="298" x2="172" y2="298" stroke="#1A1A1A" stroke-width="24" stroke-linecap="round"/>
  </g>

  <!-- Text -->
  <text x="400" y="559" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="68" font-weight="700" fill="#d4d4d4" text-anchor="middle">TaskPad</text>
  <text x="400" y="591" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif" font-size="26" fill="#888888" text-anchor="middle">Your tasks, everywhere</text>

  <!-- Feature pills: total width 485px, centered at (800-485)/2 = 158 -->
  <g transform="translate(158, 632)">
    <rect x="0" y="0" width="135" height="36" rx="18" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
    <text x="67" y="24" font-family="system-ui, sans-serif" font-size="14" fill="#d4d4d4" text-anchor="middle">Local-first</text>

    <rect x="150" y="0" width="150" height="36" rx="18" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
    <text x="225" y="24" font-family="system-ui, sans-serif" font-size="14" fill="#d4d4d4" text-anchor="middle">Real-time sync</text>

    <rect x="315" y="0" width="170" height="36" rx="18" fill="#1a1a1a" stroke="#333" stroke-width="1"/>
    <text x="400" y="24" font-family="system-ui, sans-serif" font-size="14" fill="#d4d4d4" text-anchor="middle">Encrypted vault</text>
  </g>

  <!-- Accent line at bottom -->
  <rect x="0" y="790" width="800" height="10" fill="#F59E0B"/>
</svg>
